<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor BRUXA/FINGE</title>
    <style>
        body {
            background-image: url('ceu.jpg'); 
            
            background-color: #0f0817;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            font-family: 'Helvetica', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e6ccff; 
        }

        .container {
            background-color: rgba(26, 15, 46, 0.85); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid #4B0082;
            backdrop-filter: blur(6px);
        }

        h1 {
            margin-top: 0;
            color: #bb88ff; 
            text-shadow: 0 0 10px rgba(187, 136, 255, 0.3); 
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin: 10px 0;
            background-color: rgba(10, 5, 16, 0.7);
            color: #ffffff; 
            border: 2px solid #3d1c63;
            border-radius: 8px;
            font-family: 'Helvetica', sans-serif;
            font-size: 14px;
            resize: none; 
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #8A2BE2; 
            box-shadow: 0 0 8px rgba(138, 43, 226, 0.4);
        }

        button {
            background-color: #6a0dad; 
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin: 10px 0;
            box-shadow: 0 4px 10px rgba(106, 13, 173, 0.4);
        }

        button:hover {
            background-color: #8A2BE2; 
        }

        button:active {
            transform: scale(0.97); 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 Tradutor BRUXA/FINGE 🔮</h1>
        
        <p>Manda o texto aqui:</p>
        <textarea id="entrada" placeholder="Digita a parada aqui..."></textarea>
        
        <button onclick="traduzir()">Traduzir</button>
        
        <p>Resultado:</p>
        <textarea id="saida" readonly placeholder="A tradução vai sair aqui..."></textarea>
    </div>

    <script>
        function traduzir() {
            let texto = document.getElementById('entrada').value;
            
            const mapa = {
                'B': 'F', 'F': 'B', 'b': 'f', 'f': 'b',
                'R': 'I', 'I': 'R', 'r': 'i', 'i': 'r',
                'U': 'N', 'N': 'U', 'u': 'n', 'n': 'u',
                'X': 'G', 'G': 'X', 'x': 'g', 'g': 'x',
                'A': 'E', 'E': 'A', 'a': 'e', 'e': 'a'
            };

            let resultado = '';

            for (let i = 0; i < texto.length; i++) {
                let letra = texto[i];
                resultado += mapa[letra] || letra; 
            }

            document.getElementById('saida').value = resultado;
        }
    </script>

</body>
</html>
